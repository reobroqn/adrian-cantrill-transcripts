<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adrian Scraper</title>
  <style>
    body {
      width: 260px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #121214;
      color: #e4e4e7;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 15px;
      color: #ffffff;
    }
    .logo {
      font-size: 18px;
    }
    .desc {
      font-size: 11px;
      color: #a1a1aa;
      line-height: 1.4;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 100px;
      font-size: 10px;
      font-weight: 600;
      background-color: rgba(59, 130, 246, 0.15);
      color: #60a5fa;
      align-self: flex-start;
    }
    .footer {
      font-size: 10px;
      color: #71717a;
      text-align: center;
      margin-top: 4px;
    }
    a {
      color: #3b82f6;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="logo">🍊</span>
      <span>Adrian Scraper</span>
    </div>
    <div class="desc">
      Automate Cantrill course transcript downloading. Please visit a course page on <a href="https://learn.cantrill.io" target="_blank">learn.cantrill.io</a> to access the floating orange scraper dashboard.
    </div>
    <div id="status" class="status-badge">Extension Active</div>
    <div class="footer">v1.0.0 | For educational use only.</div>
  </div>
  <script src="./index.ts" type="module"></script>
</body>
</html>
